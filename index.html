<style>
:root{
  --green:#1a7f5a;--green-d:#15694b;--green-l:#e8f5f0;--green-m:#c6e8da;

  --white:#fff;--r:10px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Yu Gothic UI','Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:var(--g100);color:var(--g900);font-size:14px;}

.sb-logo h1 i{font-size:22px;}

.nav-item{display:flex;align-items:center;gap:9px;padding:10px 1rem;cursor:pointer;color:var(--g500);font-size:13px;border-left:3px solid transparent;user-select:none;transition:all .15s;}
.nav-item:hover{background:var(--g50);color:var(--g700);}
.nav-item.active{background:var(--green-l);color:var(--green);border-left-color:var(--green);font-weight:600;}

.nav-badge{margin-left:auto;font-size:10px;font-weight:700;background:var(--green);color:#fff;border-radius:999px;padding:1px 7px;min-width:20px;text-align:center;}
.sb-footer{padding:1rem;border-top:1px solid var(--g200);font-size:11px;color:var(--g400);line-height:1.7;}

.main{flex:1;padding:1.75rem 2rem;max-width:920px;overflow-y:auto;}

.row2>*:first-child{flex:1;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rs);font-size:13px;font-family:inherit;cursor:pointer;border:1px solid var(--g200);background:var(--white);color:var(--g700);transition:all .15s;font-weight:500;text-decoration:none;white-space:nowrap;}

/* ── Chat ────────────────────────────────── */

.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:1rem;background:var(--g50);}

.msg.user{align-self:flex-end;background:var(--green);color:#fff;border-bottom-right-radius:3px;}
.msg.assistant{align-self:flex-start;background:#fff;border:1px solid var(--g200);color:var(--g900);border-bottom-left-radius:3px;}
.chat-foot{border-top:1px solid var(--g200);padding:.75rem;background:#fff;}
.qbtns{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:.6rem;}
.qbtn{font-size:11px;padding:4px 10px;border:1px solid var(--g200);border-radius:999px;background:#fff;cursor:pointer;color:var(--g500);font-family:inherit;transition:all .15s;}
.qbtn:hover{background:var(--green-l);color:var(--green);border-color:var(--green-m);}
.chat-row{display:flex;gap:6px;}
.chat-row input{flex:1;}

/* ── Misc ────────────────────────────────── */
.empty{text-align:center;padding:3rem 1rem;color:var(--g400);}
.empty i{font-size:44px;display:block;margin-bottom:10px;}
.empty p{font-size:13px;}
.dots{display:inline-flex;gap:3px;align-items:center;}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.3;animation:bl 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
@keyframes bl{40%{opacity:1;}}
.step{width:22px;height:22px;border-radius:50%;background:var(--green);color:#fff;font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.code-block{background:#1e293b;border-radius:8px;padding:1rem;overflow-x:auto;margin-top:.75rem;}
.code-block pre{font-size:11px;color:#94a3b8;font-family:'Courier New',monospace;white-space:pre-wrap;line-height:1.65;}
.copy-btn{font-size:11px;padding:4px 10px;border:1px solid #475569;border-radius:4px;background:transparent;color:#94a3b8;cursor:pointer;font-family:inherit;float:right;margin-bottom:4px;}
.copy-btn:hover{background:#334155;color:#fff;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem;}
.modal{background:#fff;border-radius:var(--r);padding:1.5rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-title{font-size:16px;font-weight:700;margin-bottom:1.25rem;display:flex;align-items:center;gap:8px;}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--g200);}
.section-sep{font-size:11px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.06em;margin:1.25rem 0 .5rem;display:flex;align-items:center;gap:8px;}
.section-sep::after{content:'';flex:1;height:1px;background:var(--g200);}
</style>

<body>
<div id="root"></div>
<script>
const {useState,useEffect,useRef,useMemo}=React;
const h=React.createElement;

const LS={
  get:k=>{try{return JSON.parse(localStorage.getItem(k));}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};

const CATS=['和','洋','中','その他'];
const SAMPLE_RECIPES=[
  {id:'s1',name:'ほうれん草のお浸し',category:'和',ingredients:'ほうれん草,だし醤油,かつお節',url:'https://www.sirogohan.com/recipe/ohitashi/',memo:''},
  {id:'s2',name:'きんぴらごぼう',category:'和',ingredients:'ごぼう,にんじん,醤油,みりん,ごま油',url:'https://www.sirogohan.com/recipe/kinpira/',memo:''},
  {id:'s3',name:'ひじきの煮物',category:'和',ingredients:'ひじき,油揚げ,にんじん,醤油,みりん',url:'https://www.sirogohan.com/recipe/hijiki/',memo:''},
  {id:'s4',name:'小松菜の炒め物',category:'和',ingredients:'小松菜,にんにく,しらす,ごま油',url:'https://www.sirogohan.com/recipe/komatuna/',memo:''},
  {id:'s5',name:'かぼちゃの煮物',category:'和',ingredients:'かぼちゃ,醤油,みりん,砂糖',url:'https://www.sirogohan.com/recipe/kabocha/',memo:''},
  {id:'s6',name:'肉じゃが',category:'和',ingredients:'じゃがいも,牛肉,玉ねぎ,醤油,みりん',url:'https://www.sirogohan.com/recipe/nikujaga/',memo:''},
  {id:'s7',name:'冷やっこ',category:'和',ingredients:'豆腐,しょうが,醤油,ねぎ',url:'https://www.sirogohan.com/recipe/hiyayakko/',memo:''},
  {id:'s8',name:'ポテトサラダ',category:'洋',ingredients:'じゃがいも,きゅうり,玉ねぎ,マヨネーズ',url:'https://www.sirogohan.com/recipe/potesara/',memo:''},
  {id:'s9',name:'キャベツの浅漬け',category:'和',ingredients:'キャベツ,塩,昆布,唐辛子',url:'https://www.sirogohan.com/recipe/kyabetsuasazuke/',memo:''},
  {id:'s10',name:'揚げ出し豆腐',category:'和',ingredients:'豆腐,だし,醤油,みりん,片栗粉',url:'https://www.sirogohan.com/recipe/agedashidoufu/',memo:''},
];

function catCls(c){
  if(!c)return'badge bo';
  if(c==='和')return'badge bw';
  if(c==='洋')return'badge by';
  if(c==='中')return'badge bc';
  return'badge bo';
}
function uid(){return 'r'+Date.now()+Math.random().toString(36).slice(2,6);}

/* ── GAS helpers ─────────────────────────────────────────────── */
const GAS_CODE=`const SS=SpreadsheetApp.getActiveSpreadsheet();
const GEMINI_API_KEY='ここにGemini APIキーを貼り付ける';

function getOrCreate(name){return SS.getSheetByName(name)||SS.insertSheet(name);}
function doGet(e){
  const cb=e&&e.parameter&&e.parameter.callback;
  const h=getOrCreate('history').getDataRange().getValues().slice(1)
    .map(r=>({date:r[0],dishes:JSON.parse(r[1]||'[]'),leftovers:r[2]||''}));
  const l=getOrCreate('library').getDataRange().getValues().slice(1)
    .map(r=>({id:r[0],name:r[1],category:r[2],ingredients:r[3],url:r[4],memo:r[5]||''}));
  return out({history:h,library:l},cb);
}
function doPost(e){
  const b=JSON.parse(e.postData.contents);
  if(b.action==='saveHistory'){
    getOrCreate('history').appendRow([b.date,JSON.stringify(b.dishes),b.leftovers||'']);
  }else if(b.action==='clearHistory'){
    const s=getOrCreate('history'),last=s.getLastRow();
    if(last>1)s.deleteRows(2,last-1);
  }else if(b.action==='saveLibrary'){
    const s=getOrCreate('library');
    if(s.getLastRow()>1)s.deleteRows(2,s.getLastRow()-1);
    b.recipes.forEach(r=>s.appendRow([r.id,r.name,r.category,r.ingredients,r.url,r.memo||'']));
  }else if(b.action==='callAI'){
    const url='https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key='+GEMINI_API_KEY;
    const res=UrlFetchApp.fetch(url,{
      method:'post',
      contentType:'application/json',
      payload:JSON.stringify({contents:b.contents})
    });
    const d=JSON.parse(res.getContentText());
    return out({text:d.candidates[0].content.parts[0].text});
  }
  return out({ok:true});
}
function out(obj,cb){
  const json=JSON.stringify(obj);
  const txt=cb?cb+'('+json+')':json;
  const mime=cb?ContentService.MimeType.JAVASCRIPT:ContentService.MimeType.JSON;
  return ContentService.createTextOutput(txt).setMimeType(mime);
}`;

async function gasRequest(url,action,body){
  return new Promise((resolve)=>{
    const cb='cb'+Date.now();
    const s=document.createElement('script');
    let settled=false;
    function done(v){if(settled)return;settled=true;document.head.removeChild(s);delete window[cb];resolve(v);}
    window[cb]=function(d){done(d);};
    setTimeout(()=>done(null),10000);
    if(action==='get'){
      s.src=url+'?callback='+cb;
    }else{
      const form=new FormData();
      form.append('payload',JSON.stringify({...body}));
      fetch(url+'?callback='+cb,{method:'POST',body:form,mode:'no-cors'})
        .then(()=>{
          setTimeout(()=>{if(!settled)done({ok:true});},500);
        }).catch(()=>done(null));
      document.head.appendChild(s);
      return;
    }
    document.head.appendChild(s);
  });
}

/* ── App ─────────────────────────────────────────────────────── */
function App(){
  const [tab,setTab]=useState('suggest');
  const [apiKey,setApiKey]=useState(()=>LS.get('k-apikey')||'');
  const [gasUrl,setGasUrl]=useState(()=>LS.get('k-gasurl')||'');
  const [gasOk,setGasOk]=useState(null);
  const [library,setLibrary]=useState(()=>LS.get('k-library')||SAMPLE_RECIPES);
  const [history,setHistory]=useState(()=>LS.get('k-history')||[]);
  const [leftovers,setLeftovers]=useState('');
  const [freeReq,setFreeReq]=useState('');
  const [loading,setLoading]=useState(false);
  const [suggestions,setSuggestions]=useState([]);
  const [err,setErr]=useState('');
  const [ok,setOk]=useState('');
  const [chatMsgs,setChatMsgs]=useState([
    {role:'assistant',content:'こんにちは！小鉢のご相談をどうぞ。\nライブラリの料理から、食材・気分・条件で絞り込んでご提案します。'}
  ]);
  const [chatIn,setChatIn]=useState('');
  const [chatLoad,setChatLoad]=useState(false);
  // Library state
  const [libSearch,setLibSearch]=useState('');
  const [libCat,setLibCat]=useState('すべて');
  const [showModal,setShowModal]=useState(false);
  const [editItem,setEditItem]=useState(null);
  const [form,setForm]=useState({name:'',category:'和',ingredients:'',url:'',memo:''});
  const chatEnd=useRef(null);

  /* sync on mount */
  useEffect(()=>{syncFromGas();},[gasUrl]);
  useEffect(()=>{chatEnd.current?.scrollIntoView({behavior:'smooth'});},[chatMsgs]);

  async function syncFromGas(){
    if(!gasUrl){setGasOk(null);return;}
    const d=await gasRequest(gasUrl,'get',{});
    if(!d){setGasOk(false);return;}
    setGasOk(true);
    if(d.history?.length)setHistory(d.history);
    if(d.library?.length)setLibrary(d.library);
  }

  async function saveLibraryRemote(lib){
    LS.set('k-library',lib);
    if(gasUrl)await gasRequest(gasUrl,'post',{action:'saveLibrary',recipes:lib});
  }
  async function saveHistoryRemote(hist){
    LS.set('k-history',hist);
  }

  function flash(msg,type){
    if(type==='ok')setOk(msg);else setErr(msg);
    setTimeout(()=>{setOk('');setErr('');},3500);
  }

  /* ── AI call ───────────────────────────────────────────────── */
  async function callAI(messages,system,maxTok=1000){
    if(!gasUrl){flash('設定タブでGAS URLを入力してください','err');return null;}
    const contents=[
      ...(system?[{role:'user',parts:[{text:system}]},{role:'model',parts:[{text:'わかりました。'}]}]:[]),
      ...messages.map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]}))
    ];
    const d=await gasRequest(gasUrl,'post',{action:'callAI',contents});
    if(!d||!d.text)throw new Error('AI呼び出しに失敗しました');
    return d.text;
  }

  /* ── 提案生成 ───────────────────────────────────────────────── */
  const recentNames=history.slice(-14).flatMap(x=>x.dishes.map(d=>d.name));

  async function generate(){
    if(library.length<3){flash('ライブラリに料理を3品以上登録してください','err');return;}
    setLoading(true);setErr('');setSuggestions([]);

    const available=library.filter(r=>!recentNames.includes(r.name));
    if(available.length<3){
      flash('かぶり除外後の候補が3品未満です。履歴をリセットするかライブラリを増やしてください','err');
      setLoading(false);return;
    }
    const leftoverList=leftovers.split(/[、,，\s]+/).map(s=>s.trim()).filter(Boolean);
    const libJson=available.map(r=>({name:r.name,category:r.category,ingredients:r.ingredients,url:r.url}));

    const prompt=`以下は飲食店の小鉢ライブラリです。この中から今日の定食に添える小鉢3品を選んでください。

【ライブラリ（候補一覧）】
${JSON.stringify(libJson,null,2)}

【前日の余り食材（優先使用）】: ${leftoverList.length?leftoverList.join('、'):'特になし'}
【追加リクエスト】: ${freeReq||'特になし'}

選定条件:
- 3品はジャンル・調理法・味が偏らない組み合わせ
- 余り食材がある場合、その食材を含む料理を優先
- ライブラリ外の料理は選ばない

必ずJSON形式のみ返すこと。前置き不要。
{"picks":[{"name":"料理名","reason":"選んだ理由（20字以内）","usesLeftover":true,"leftoverIngredient":"食材名またはnull"}]}`;

    try{
      const txt=await callAI([{role:'user',content:prompt}],null,600);
      if(!txt)return;
      const parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
      const picks=(parsed.picks||[]).map(p=>{
        const lib=library.find(r=>r.name===p.name)||{};
        return {...p,...lib};
      });
      setSuggestions(picks);
    }catch(e){flash('生成失敗: '+e.message,'err');}
    setLoading(false);
  }

  async function saveToday(){
    if(!suggestions.length)return;
    const today=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
    const entry={date:today,dishes:suggestions,leftovers};
    const nh=[...history,entry].slice(-30);
    setHistory(nh);
    await saveHistoryRemote(nh);

    const libSummary=library.slice(0,40).map(r=>`・${r.name}（${r.category}）食材:${r.ingredients}`).join('\n');
    const sys=`飲食店の日替わり小鉢メニュー提案アシスタントです。
登録ライブラリ（一部）:
${libSummary}
余り食材:${leftovers||'なし'} 最近使用:${recentNames.slice(-7).join('、')||'なし'}
ライブラリ内の料理を中心に、具体的・簡潔に日本語で提案してください。`;
    try{
      const reply=await callAI(nm.map(m=>({role:m.role,content:m.content})),sys,600);
      if(reply)setChatMsgs([...nm,{role:'assistant',content:reply}]);
